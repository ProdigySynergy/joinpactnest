version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: vowbird-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: vowbird
      MYSQL_USER: vowbird
      MYSQL_PASSWORD: vowbird_secret
    volumes:
      - vowbird_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  vowbird_mysql_data:
